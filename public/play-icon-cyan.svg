<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b8f0"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#0080aa"/>
    </linearGradient>

    <!-- Scanline gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(255,255,255,0.025)"/>
      <stop offset="25%" stop-color="rgba(255,255,255,0.025)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0.02)"/>
      <stop offset="75%" stop-color="rgba(0,0,0,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.025)"/>
    </linearGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="512" height="44" patternUnits="userSpaceOnUse">
      <rect width="512" height="44" fill="url(#scanGrad)"/>
    </pattern>

    <!-- Top highlight -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Rounded clip -->
    <clipPath id="clip">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Overlays -->
  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#scanlines)"/>
    <rect width="512" height="512" fill="url(#topShine)"/>
  </g>

  <!-- Play button -->
  <polygon points="198,148 362,256 198,364" fill="none" stroke="#0a0a0f" stroke-width="32" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
